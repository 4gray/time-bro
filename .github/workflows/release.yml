name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build renderer and Electron files
        run: npm run build

  build:
    name: Build ${{ matrix.platform }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            script: npm run dist:mac
            artifact_name: timebro-macos
            artifact_paths: |
              release/*.dmg
              release/*.zip
          - platform: windows
            os: windows-latest
            script: npm run dist:win
            artifact_name: timebro-windows
            artifact_paths: |
              release/*.exe
              release/*.zip
          - platform: linux
            os: ubuntu-latest
            script: npm run dist:linux
            artifact_name: timebro-linux
            artifact_paths: |
              release/*.AppImage
              release/*.deb
              release/*.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop package
        run: ${{ matrix.script }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --draft \
              --title "$TAG_NAME" \
              --generate-notes \
              --verify-tag
          fi
